# ── Counterfactual VLM bias benchmark configuration ──────────────────────────
# Override any of these from run.sh / CLI flags.

output_dir: results

# Which datasets to evaluate (from apart-global-south-hack org). Keys: pendulum | feliren | remote_sensing | objects3d
datasets:
  - pendulum
  - feliren
  - remote_sensing
  - objects3d

# Languages: "all" or an explicit list, e.g. [english, hindi, urdu, telugu]
languages: all

# Evaluation conditions (prompt templates in classify.py):
#   inference          : image + counterfactual caption + question (+ abstain option)
#   perception_control : image + question only, NO caption (perceptual ceiling)
conditions:
  - inference
  - perception_control

# Models to evaluate (run sequentially, one loaded at a time).
# Keys -> see models.py MODEL_REGISTRY.
models:
  - qwen2.5-vl-7b
  - internvl3-8b
  - qwen3-vl-8b
  - llava-onevision-7b
  # - aya-vision-8b      # gated: needs license acceptance + HF_TOKEN

# Cap rows per (dataset, language) group. Use null / -1 for ALL rows.
max_samples_per_group: 25
shuffle_seed: 1234

# Answer scoring:
#   logit    : ONE forward pass per item; read the A/B/C/D answer-token logits at
#              the final position, argmax = answer. No autoregressive decoding, so
#              this is ~2-4x faster than generation. Hidden states are captured
#              from the same forward pass (identical mech-interp semantics).
#   generate : legacy free-text generation + regex parsing (slower; keeps raw text).
scoring: logit

# Logit mode: number of items scored per forward pass. Larger = faster on a big
# GPU; on CUDA OOM the batch auto-halves down to 1, and any model whose processor
# can't batch falls back to per-item — so this is safe to leave high.
# Set to 1 to disable batching.
batch_size: 8

# Generation (only used when scoring: generate)
max_new_tokens: 24
dtype: bfloat16            # bfloat16 | float16 | float32
device_map: auto
attn_impl: sdpa            # eager | sdpa | flash_attention_2  (sdpa = fast default)

# Mechanistic interpretability — last-token hidden state per layer.
# Capture is STRATIFIED: up to `max_hidden_per_cell` samples per
# (dataset x language) cell within each (model, condition), so the residual
# stream can be probed per-dataset and per-language (not just per-model).
save_hidden_states: true
max_hidden_per_cell: 20          # balanced quota per (dataset, language) cell
max_hidden_state_samples: 2000   # global safety ceiling per (model, condition)

# HF auth: do NOT hardcode the token here. Export it instead:
#   export HF_TOKEN=hf_...     (vlm_bench.py reads it via os.environ)
# Needed only for gated models (e.g. aya-vision-8b).
hf_token: null
cache_dir: null

# Force a fresh pull of upstream datasets (bypass HF cache). Use after a
# dataset's columns/rows are updated upstream.
force_redownload: false
